name: C++20 Showcase CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC 13 on Ubuntu 24.04
          - os: ubuntu-24.04
            compiler: gcc-13
            cxx: g++-13
            cc:  gcc-13
            std: 23

          # Clang 17 on Ubuntu 24.04
          - os: ubuntu-24.04
            compiler: clang-17
            cxx: clang++-17
            cc:  clang-17
            std: 23

          # MSVC on Windows (latest)
          - os: windows-latest
            compiler: msvc
            std: 23

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.compiler }} ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress

      # MSVC requires the VS Developer Environment to be active
      # so that cl.exe and MSBuild are in PATH. Without this step,
      # cmake cannot find the compiler and configure fails.
      - name: Setup MSVC Developer Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }}

      - name: Configure (Windows / MSVC)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CXX_STANDARD=${{ matrix.std }}
        shell: pwsh

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.compiler }}
          path: build/Testing/
          retention-days: 7
